<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>Blue-Bot Music Overlay</title>
	<!-- Load YouTube IFrame API synchronously so CEF (OBS) honors the autoplay window -->
	<script src="https://www.youtube.com/iframe_api"></script>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			background: transparent;
			color: #fff;
			font-family: 'Segoe UI', Tahoma, sans-serif;
			overflow: hidden;
		}

		/*
		 * YouTube player: must be VISIBLE in the layout (not display:none, not offscreen)
		 * because Chromium/CEF will pause autoplay if it thinks the player is hidden.
		 * We keep it on-screen but tiny + ~invisible. Audio still plays normally.
		 */
		#player-host {
			position: absolute;
			bottom: 4px;
			right: 4px;
			width: 80px;
			height: 60px;
			opacity: 0.001;
			pointer-events: none;
			z-index: -1;
		}
		#player-host iframe {
			width: 100% !important;
			height: 100% !important;
		}

		/* Now Playing card */
		#now-playing {
			position: absolute;
			bottom: 32px;
			left: 32px;
			padding: 16px 24px;
			background: rgba(20, 24, 40, 0.85);
			backdrop-filter: blur(8px);
			border-radius: 12px;
			border-left: 4px solid #4cc9f0;
			box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
			max-width: 480px;
			transform: translateY(120%);
			transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
		}
		#now-playing.visible {
			transform: translateY(0);
		}

		#np-label {
			font-size: 11px;
			text-transform: uppercase;
			letter-spacing: 2px;
			color: #4cc9f0;
			margin-bottom: 6px;
			display: flex;
			align-items: center;
			gap: 6px;
		}
		#np-label::before {
			content: '';
			display: inline-block;
			width: 8px;
			height: 8px;
			background: #4cc9f0;
			border-radius: 50%;
			animation: pulse 1.4s ease-in-out infinite;
		}
		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}

		#np-title {
			font-size: 18px;
			font-weight: 600;
			line-height: 1.3;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#np-requester {
			font-size: 13px;
			color: #b8c5d6;
			margin-top: 4px;
		}

		#np-requester strong {
			color: #ffd166;
		}

		#queue-badge {
			position: absolute;
			top: -10px;
			right: -10px;
			background: #ef476f;
			color: #fff;
			font-size: 11px;
			font-weight: 700;
			padding: 4px 10px;
			border-radius: 10px;
			box-shadow: 0 2px 8px rgba(239, 71, 111, 0.4);
		}

		/* On-screen debug panel — visible only when ?debug=1 is in the URL */
		#debug-panel {
			position: absolute;
			top: 16px;
			right: 16px;
			padding: 12px 16px;
			background: rgba(0, 0, 0, 0.8);
			color: #0f0;
			font-family: 'Consolas', 'Courier New', monospace;
			font-size: 12px;
			line-height: 1.5;
			border: 1px solid #0f0;
			border-radius: 6px;
			max-width: 420px;
			min-width: 280px;
			white-space: pre-wrap;
			display: none;
			z-index: 9999;
		}
		body.debug #debug-panel { display: block; }
	</style>
</head>
<body>
	<div id="player-host"><div id="player"></div></div>

	<div id="now-playing">
		<div id="np-label">Now Playing</div>
		<div id="np-title">—</div>
		<div id="np-requester"></div>
		<div id="queue-badge" style="display:none;"></div>
	</div>

	<div id="debug-panel">Debug initializing...</div>

	<script>
		// --- CONFIG ---
		const POLL_INTERVAL_MS = 3000;
		const API_BASE = '';

		// Read which channel this overlay is for from the URL query string.
		// E.g., http://localhost:3000/overlay/?channel=248515674
		const CHANNEL_ID = new URLSearchParams(window.location.search).get('channel');
		if (!CHANNEL_ID) {
			document.body.innerHTML = '<div style="padding:40px;color:#fff;font-family:sans-serif;background:#1a1a2e;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;"><div><h1>⚠️ Missing channel parameter</h1><p>The overlay URL needs <code>?channel=&lt;broadcasterId&gt;</code></p><p style="margin-top:20px;font-size:14px;color:#888;">Example: <code>http://localhost:3000/overlay/?channel=248515674</code></p></div></div>';
			throw new Error('Missing ?channel= URL parameter');
		}
		const CHANNEL_QS = '?channel=' + encodeURIComponent(CHANNEL_ID);

		// --- DEBUG MODE — append ?debug=1 to URL to show on-screen log ---
		const DEBUG = new URLSearchParams(window.location.search).get('debug') === '1';
		if (DEBUG) document.body.classList.add('debug');
		const debugPanel = document.getElementById('debug-panel');
		const debugLog = [];
		function dlog(msg) {
			console.log(msg);
			// Always phone home to the bot terminal so the streamer can see overlay state
			fetch('/api/log', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ msg }),
			}).catch(() => {}); // silent — terminal logging is best-effort
			if (!DEBUG) return;
			const stamp = new Date().toLocaleTimeString();
			debugLog.unshift(`[${stamp}] ${msg}`);
			if (debugLog.length > 12) debugLog.length = 12;
			debugPanel.textContent = debugLog.join('\n');
		}

		// --- STATE ---
		let player = null;
		let currentVideoId = null;
		let isPlayerReady = false;
		let ytScriptAttempts = 0;
		dlog('Page loaded');

		// --- YT API LOAD WATCHDOG ---
		// If window.YT doesn't appear within 5s, something blocked the iframe_api script.
		// We dynamically re-inject it (bypassing whatever blocked the static <script> tag).
		function checkYTLoaded() {
			if (window.YT && window.YT.Player) {
				dlog('[YT] window.YT detected, API is alive');
				return;
			}
			ytScriptAttempts++;
			if (ytScriptAttempts > 3) {
				dlog('[YT] FATAL: iframe_api never loaded after 3 attempts. Likely blocked by an extension/firewall.');
				return;
			}
			dlog('[YT] window.YT missing — attempt ' + ytScriptAttempts + ' to re-inject iframe_api');
			const s = document.createElement('script');
			s.src = 'https://www.youtube.com/iframe_api?_t=' + Date.now();
			s.onerror = () => dlog('[YT] script onerror fired — definitely blocked');
			document.head.appendChild(s);
			setTimeout(checkYTLoaded, 5000);
		}
		setTimeout(checkYTLoaded, 5000);

		// --- DOM ---
		const npCard = document.getElementById('now-playing');
		const npTitle = document.getElementById('np-title');
		const npRequester = document.getElementById('np-requester');
		const queueBadge = document.getElementById('queue-badge');

		// --- YOUTUBE IFRAME API ---
		// onYouTubeIframeAPIReady is called automatically when the iframe API script finishes loading.
		window.onYouTubeIframeAPIReady = function () {
			dlog('[YT] IFrame API ready, building player');
			player = new YT.Player('player', {
				height: '60',
				width: '80',
				playerVars: {
					autoplay: 1,
					mute: 1, // CRITICAL: muted autoplay is the only path Chrome/CEF allows w/o user gesture
					controls: 0,
					modestbranding: 1,
					rel: 0,
					playsinline: 1,
					origin: window.location.origin,
				},
				events: {
					onReady: () => {
						isPlayerReady = true;
						try {
							// Keep muted at first — we unmute on PLAYING state change.
							player.mute();
							player.setVolume(80);
						} catch (e) {
							dlog('[YT] could not set volume: ' + e.message);
						}
						dlog('[YT] player READY (muted), vol=80 — will unmute on PLAY');
						tick();
					},
					onStateChange: (e) => {
						const states = { '-1': 'unstarted', 0: 'ended', 1: 'PLAYING', 2: 'paused', 3: 'buffering', 5: 'cued' };
						dlog('[YT] state: ' + (states[e.data] || e.data));
						// Unmute the MOMENT YouTube confirms playback started
						if (e.data === YT.PlayerState.PLAYING) {
							try {
								player.unMute();
								player.setVolume(80);
								dlog('[YT] 🔊 UNMUTED — audio should be live now');
							} catch (err) {
								dlog('[YT] unMute failed: ' + err.message);
							}
						}
						if (e.data === YT.PlayerState.ENDED) {
							currentVideoId = null;
							advanceQueue();
						}
					},
					onError: (e) => {
						dlog('[YT] ERROR code ' + e.data + ' — skipping');
						currentVideoId = null;
						advanceQueue();
					},
				},
			});
		};

		// --- API CALLS ---
		async function fetchCurrent() {
			try {
				const res = await fetch(API_BASE + '/api/queue/current' + CHANNEL_QS);
				return await res.json();
			} catch (err) {
				console.error('fetchCurrent failed', err);
				return null;
			}
		}

		async function advanceQueue() {
			try {
				await fetch(API_BASE + '/api/queue/advance' + CHANNEL_QS, { method: 'POST' });
			} catch (err) {
				console.error('advance failed', err);
			}
		}

		// --- DISPLAY UPDATES ---
		function showCard(song, queueLength) {
			npTitle.textContent = song.title;
			npRequester.innerHTML = 'Requested by <strong>@' + escapeHTML(song.requestedBy) + '</strong>';
			if (queueLength > 1) {
				queueBadge.textContent = '+' + (queueLength - 1) + ' queued';
				queueBadge.style.display = 'block';
			} else {
				queueBadge.style.display = 'none';
			}
			npCard.classList.add('visible');
		}

		function hideCard() {
			npCard.classList.remove('visible');
		}

		function escapeHTML(s) {
			return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
		}

		// --- MAIN LOOP ---
		async function tick() {
			const data = await fetchCurrent();
			if (!data || !data.current) {
				hideCard();
				return;
			}

			const song = data.current;

			// Text-only entry — show the card and auto-skip after 30s
			if (!song.videoId) {
				showCard(song, data.queueLength);
				if (currentVideoId !== '__text__' + song.title) {
					currentVideoId = '__text__' + song.title;
					console.log('Text-only entry, auto-skipping in 30s:', song.title);
					setTimeout(() => {
						if (currentVideoId === '__text__' + song.title) advanceQueue();
					}, 30000);
				}
				return;
			}

			// New playable song detected — load it into the player and force-play.
			// CRITICAL: only update currentVideoId AFTER a successful load. If the player isn't
			// ready yet, leave currentVideoId alone so the next tick retries the load.
			if (song.videoId !== currentVideoId) {
				showCard(song, data.queueLength);
				if (isPlayerReady && player && player.loadVideoById) {
					dlog('[YT] Loading: ' + song.videoId);
					player.loadVideoById(song.videoId);
					currentVideoId = song.videoId; // mark loaded ONLY now
					setTimeout(() => {
						try {
							// Stay muted here — we let onStateChange PLAYING handler do the unmute
							player.playVideo();
							const st = player.getPlayerState && player.getPlayerState();
							dlog('[YT] Forced play (muted), state=' + st);
						} catch (e) {
							dlog('[YT] forced play failed: ' + e.message);
						}
					}, 500);
				} else {
					dlog('[YT] Not ready, retry next tick (ready=' + isPlayerReady + ')');
					// DO NOT set currentVideoId — let next tick retry the load
				}
			} else {
				showCard(song, data.queueLength);
			}
		}

		setInterval(tick, POLL_INTERVAL_MS);
		tick();
	</script>
</body>
</html>
