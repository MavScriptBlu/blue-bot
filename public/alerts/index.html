<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>Blue-Bot Alerts Overlay</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			background: transparent;
			color: #fff;
			font-family: 'Segoe UI', 'Inter', sans-serif;
			overflow: hidden;
		}

		/* Stage where banners appear */
		#stage {
			position: absolute;
			top: 80px;
			left: 50%;
			transform: translateX(-50%) scale(var(--banner-scale, 1));
			transform-origin: top center;
			width: 720px;
			pointer-events: none;
		}

		.banner {
			position: relative;
			background: linear-gradient(135deg, rgba(20, 24, 40, 0.96) 0%, rgba(40, 50, 80, 0.96) 100%);
			border-radius: 20px;
			padding: 24px 32px;
			display: flex;
			align-items: center;
			gap: 24px;
			box-shadow:
				0 20px 60px rgba(0, 0, 0, 0.5),
				0 0 80px var(--glow, rgba(76, 201, 240, 0.4)),
				inset 0 1px 0 rgba(255, 255, 255, 0.1);
			border: 2px solid var(--accent, #4cc9f0);
			opacity: 0;
			transform: translateY(-40px) scale(0.95);
			transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1), transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
		}
		.banner.visible {
			opacity: 1;
			transform: translateY(0) scale(1);
		}
		.banner.exiting {
			opacity: 0;
			transform: translateY(-40px) scale(0.95);
		}

		.avatar-wrap {
			position: relative;
			flex-shrink: 0;
		}
		.avatar {
			width: 96px;
			height: 96px;
			border-radius: 50%;
			border: 4px solid var(--accent, #4cc9f0);
			background: #16213e;
			object-fit: cover;
			box-shadow: 0 0 20px var(--glow, rgba(76, 201, 240, 0.6));
		}
		.avatar-placeholder {
			width: 96px;
			height: 96px;
			border-radius: 50%;
			background: linear-gradient(135deg, #4cc9f0, #7c3aed);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 48px;
			font-weight: 700;
			color: #fff;
			border: 4px solid var(--accent, #4cc9f0);
		}
		.event-badge {
			position: absolute;
			bottom: -4px;
			right: -4px;
			background: var(--accent, #4cc9f0);
			color: #0a0a1a;
			font-size: 28px;
			width: 40px;
			height: 40px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			border: 3px solid #14182a;
			animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
		}
		@keyframes pop {
			0% { transform: scale(0); }
			100% { transform: scale(1); }
		}

		.text {
			flex: 1;
			min-width: 0;
		}
		.event-label {
			font-size: 13px;
			font-weight: 600;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: var(--accent, #4cc9f0);
			margin-bottom: 6px;
		}
		.user-name {
			font-size: 32px;
			font-weight: 700;
			line-height: 1.1;
			margin-bottom: 4px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.user-meta {
			font-size: 15px;
			color: #b8c5d6;
			line-height: 1.4;
		}
		.user-meta strong {
			color: #ffd166;
		}
		.user-link {
			display: inline-block;
			margin-top: 6px;
			font-size: 13px;
			color: #4cc9f0;
			font-family: 'Consolas', 'Courier New', monospace;
		}

		/* Color themes per event type */
		.banner.welcome { --accent: #4cc9f0; --glow: rgba(76, 201, 240, 0.5); }
		.banner.follow  { --accent: #06d6a0; --glow: rgba(6, 214, 160, 0.5); }
		.banner.subscribe { --accent: #c77dff; --glow: rgba(199, 125, 255, 0.6); }
		.banner.raid    { --accent: #ef476f; --glow: rgba(239, 71, 111, 0.6); }

		/* Confetti animation for subscribe + raid */
		.confetti {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			pointer-events: none;
			overflow: hidden;
			border-radius: 20px;
		}
		.confetti span {
			position: absolute;
			width: 8px;
			height: 8px;
			background: var(--accent);
			border-radius: 2px;
			animation: confetti-fall 1.2s ease-out forwards;
		}
		@keyframes confetti-fall {
			0% { transform: translateY(-20px) rotate(0); opacity: 1; }
			100% { transform: translateY(140px) rotate(540deg); opacity: 0; }
		}

		#status {
			position: absolute;
			bottom: 16px;
			right: 16px;
			padding: 6px 12px;
			background: rgba(0, 0, 0, 0.5);
			border-radius: 4px;
			font-size: 11px;
			color: #888;
			font-family: monospace;
			display: none;
		}
		body.debug #status { display: block; }
	</style>
</head>
<body>
	<div id="stage"></div>
	<div id="status">Connecting...</div>

	<script>
		const CHANNEL_ID = new URLSearchParams(window.location.search).get('channel');
		const DEBUG = new URLSearchParams(window.location.search).get('debug') === '1';
		if (DEBUG) document.body.classList.add('debug');

		// Allow scaling the banner via ?scale=1.5 (1 = default, 1.5 = 50% bigger, 2 = double, etc.)
		const SCALE = parseFloat(new URLSearchParams(window.location.search).get('scale')) || 1;
		if (SCALE !== 1) {
			document.documentElement.style.setProperty('--banner-scale', SCALE);
		}

		const stage = document.getElementById('stage');
		const status = document.getElementById('status');

		if (!CHANNEL_ID) {
			stage.innerHTML = '<div style="background:rgba(0,0,0,0.8);padding:20px;border-radius:8px;color:#fff;font-family:sans-serif;text-align:center;">⚠️ Missing <code>?channel=&lt;broadcasterId&gt;</code> in URL</div>';
			throw new Error('Missing channel param');
		}

		const queue = [];
		let showing = false;
		const DISPLAY_MS = 7000; // how long each banner stays visible

		function statusMsg(s) { status.textContent = s; }

		function enqueue(type, data) {
			queue.push({ type, data });
			if (!showing) showNext();
		}

		function showNext() {
			if (queue.length === 0) {
				showing = false;
				return;
			}
			showing = true;
			const { type, data } = queue.shift();
			renderBanner(type, data);
		}

		function getInitials(name) {
			return (name || '?').split(/\s+/).map(s => s[0] || '').join('').slice(0, 2).toUpperCase();
		}

		function escapeHTML(s) {
			return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
		}

		// Random pick helper for varied flavor text
		function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

		const FOLLOW_LINES = [
			'Just joined the ohana! 💙',
			'Welcome to the family, fam! 🌀',
			'Locked into the squad! 🎯',
			'Spotted a fresh face in chat! ✨',
			'The vibe just leveled up! 🚀',
		];

		const RAID_LINES = (viewers) => [
			`Brought <strong>${viewers}</strong> viewers through the portal! 🌀`,
			`Rolled in with <strong>${viewers}</strong> legends! Show 'em love!`,
			`Inbound: <strong>${viewers}</strong> new hype generators! 🔥`,
			`<strong>${viewers}</strong> raiders just dropped in! Send respect!`,
		];

		function renderBanner(type, data) {
			const presets = {
				follow: {
					icon: '💚',
					label: 'NEW FOLLOWER',
					metaTpl: () => pick(FOLLOW_LINES),
				},
				subscribe: {
					icon: '⭐',
					label: data && data.isGift ? '🎁 GIFTED SUB' : 'SUB ALERT',
					metaTpl: (d) => `${escapeHTML(d.tier || 'Tier 1')} sub! ${d.isGift ? 'Gifted with love 💜' : 'Welcome to the inner circle 💜'}`,
				},
				raid: {
					icon: '🚨',
					label: 'INCOMING RAID',
					metaTpl: (d) => pick(RAID_LINES(d.viewers || 0)),
				},
			};
			const preset = presets[type];
			if (!preset) {
				// Unknown event type (e.g., stale 'welcome' from old code) — just drop it silently
				console.warn('[alerts] ignoring unknown event type:', type);
				showNext();
				return;
			}

			const avatarHtml = data.avatarUrl
				? `<img src="${escapeHTML(data.avatarUrl)}" class="avatar" alt="${escapeHTML(data.displayName)}" />`
				: `<div class="avatar-placeholder">${getInitials(data.displayName)}</div>`;

			const banner = document.createElement('div');
			banner.className = 'banner ' + type;
			banner.innerHTML = `
				<div class="avatar-wrap">
					${avatarHtml}
					<div class="event-badge">${preset.icon}</div>
				</div>
				<div class="text">
					<div class="event-label">${preset.label}</div>
					<div class="user-name">${escapeHTML(data.displayName)}</div>
					<div class="user-meta">${preset.metaTpl(data)}</div>
					<div class="user-link">${escapeHTML(data.link || '')}</div>
				</div>
			`;

			// Confetti for big events
			if (type === 'subscribe' || type === 'raid') {
				const conf = document.createElement('div');
				conf.className = 'confetti';
				for (let i = 0; i < 16; i++) {
					const s = document.createElement('span');
					s.style.left = (Math.random() * 100) + '%';
					s.style.animationDelay = (Math.random() * 0.4) + 's';
					s.style.background = ['#ef476f', '#ffd166', '#06d6a0', '#4cc9f0', '#c77dff'][i % 5];
					conf.appendChild(s);
				}
				banner.appendChild(conf);
			}

			stage.appendChild(banner);
			requestAnimationFrame(() => banner.classList.add('visible'));

			setTimeout(() => {
				banner.classList.remove('visible');
				banner.classList.add('exiting');
				setTimeout(() => {
					banner.remove();
					showNext();
				}, 500);
			}, DISPLAY_MS);
		}

		// --- SSE CONNECTION ---
		function connectSSE() {
			const evt = new EventSource('/api/events?channel=' + encodeURIComponent(CHANNEL_ID));

			evt.addEventListener('connected', () => {
				statusMsg('Connected ✅');
				console.log('[alerts] SSE connected');
			});

			// Note: 'welcome' (auto-SO for first-time chatters) is intentionally NOT listed —
			// the chat message still fires but no on-screen banner appears.
			['follow', 'subscribe', 'raid'].forEach(type => {
				evt.addEventListener(type, (e) => {
					try {
						const data = JSON.parse(e.data);
						console.log('[alerts] received', type, data);
						enqueue(type, data);
					} catch (err) {
						console.error('[alerts] bad payload', err);
					}
				});
			});

			evt.onerror = () => {
				statusMsg('Reconnecting...');
				// EventSource auto-reconnects, but if it errors hard, we can force a new connection
				setTimeout(() => {
					if (evt.readyState === EventSource.CLOSED) {
						evt.close();
						connectSSE();
					}
				}, 3000);
			};
		}
		connectSSE();

		// --- TEST MODE — append ?test=welcome|follow|subscribe|raid to preview a banner ---
		const testType = new URLSearchParams(window.location.search).get('test');
		if (testType) {
			setTimeout(() => {
				enqueue(testType, {
					username: 'testuser',
					displayName: 'TestUser',
					avatarUrl: null,
					gameName: 'Just Chatting',
					tier: 'Tier 1',
					isGift: false,
					viewers: 42,
					link: 'https://twitch.tv/testuser',
				});
			}, 500);
		}
	</script>
</body>
</html>
